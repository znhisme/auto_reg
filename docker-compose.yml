services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CAMOUFOX_VERSION: ${CAMOUFOX_VERSION:-135.0.1}
        CAMOUFOX_RELEASE: ${CAMOUFOX_RELEASE:-beta.24}
    container_name: any-auto-register
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      APP_RELOAD: "0"
      APP_CONDA_ENV: docker
      APP_RUNTIME_DIR: /runtime
      APP_ENABLE_SOLVER: "1"
      SOLVER_PORT: "8889"
      SOLVER_BIND_HOST: 0.0.0.0
      LOCAL_SOLVER_URL: http://127.0.0.1:8889
      SOLVER_BROWSER_TYPE: ${SOLVER_BROWSER_TYPE:-camoufox}
    ports:
      - "8000:8000"
      - "127.0.0.1:8889:8889"
      - "8317:8317"
      - "8011:8011"
    volumes:
      - /opt/kom-any-auto-register/data:/runtime
      - /opt/kom-any-auto-register/_ext_targets:/_ext_targets
      - /opt/kom-any-auto-register/external_logs:/app/services/external_logs
    shm_size: "1gb"
